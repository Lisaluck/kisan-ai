{% extends 'core/base.html' %}
{% block title %}Login — Kisan AI{% endblock %}
{% block content %}
<div style="max-width:420px;margin:2rem auto;">
  <div class="card">
    <div class="card-header">
      <div style="text-align:center;margin-bottom:1rem;font-size:40px;">🌱</div>
      <h1 class="card-title" style="text-align:center;">Welcome back</h1>
      <p class="card-subtitle" style="text-align:center;">Login to your Kisan AI account</p>
    </div>

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-input" placeholder="Enter username" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-input" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:.5rem;">Login →</button>
    </form>

    <div class="divider"></div>
    <p style="text-align:center;font-size:14px;color:var(--gray-500);">
      Don't have an account? <a href="{% url 'register' %}" style="color:var(--green-700);font-weight:600;">Register here</a>
    </p>
  </div>
</div>
{% endblock %}
